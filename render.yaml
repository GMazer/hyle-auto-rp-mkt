services:
  - type: background-worker
    name: hyle-mkt-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: GOOGLE_TOKEN_JSON
        sync: false
      - key: GOOGLE_SHEETS_TEMPLATE_ID
        sync: false
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false
      - key: ALLOWED_USERS
        sync: false
      - key: LOG_LEVEL
        value: INFO
